<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PetCare — Página no encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--g:#2ECC71;--g2:#27AE60;--g3:#E8FBF0;--cream:#FAFAF8;--ink:#111;--mid:#555;--lite:#999;--w:#fff;--bd:#E8E8E8;--ease:cubic-bezier(.16,1,.3,1);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;cursor:none;-webkit-font-smoothing:antialiased;}
#cur,#cur2{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;}
#cur{width:10px;height:10px;background:var(--g);top:0;left:0;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
#cur2{width:34px;height:34px;border:1.5px solid rgba(46,204,113,.4);top:0;left:0;transform:translate(-50%,-50%);transition:width .4s var(--ease),height .4s var(--ease);}
@media(max-width:900px){#cur,#cur2{display:none;}body{cursor:auto;}}
.box{text-align:center;max-width:480px;}
.pet-ico{width:100px;height:100px;background:var(--g3);border-radius:28px;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.num{font-size:96px;font-weight:900;color:var(--ink);letter-spacing:-6px;line-height:1;margin-bottom:8px;}
.num span{color:var(--g);}
.title{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-1px;margin-bottom:10px;}
.sub{font-size:15px;color:var(--mid);line-height:1.7;margin-bottom:32px;}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-main{padding:14px 28px;background:var(--ink);color:var(--w);border:none;border-radius:50px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:none;transition:all .3s var(--ease);text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-main:hover{background:var(--g);transform:translateY(-2px);}
.btn-out{padding:13px 24px;background:var(--w);color:var(--ink);border:2px solid var(--bd);border-radius:50px;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:none;transition:all .2s;text-decoration:none;}
.btn-out:hover{border-color:var(--ink);}
.suggestions{margin-top:48px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.sug{padding:8px 18px;background:var(--w);border:1.5px solid var(--bd);border-radius:50px;font-size:13px;font-weight:700;color:var(--mid);text-decoration:none;transition:all .2s;}
.sug:hover{border-color:var(--g);color:var(--g2);background:var(--g3);}
.logo{position:fixed;top:24px;left:24px;display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-ico{width:32px;height:32px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-n{font-size:16px;font-weight:800;color:var(--ink);}
</style>
</head>
<body>
<div id="cur"></div><div id="cur2"></div>
<a href="index.html" class="logo"><div class="logo-ico">🐾</div><span class="logo-n">PetCare</span></a>
<div class="box">
  <div class="pet-ico">
    <svg viewBox="0 0 64 64" fill="none" width="60" height="60"><ellipse cx="32" cy="38" rx="18" ry="14" fill="#F5CBA7"/><circle cx="32" cy="22" r="13" fill="#F5CBA7"/><ellipse cx="19" cy="20" rx="6" ry="9" fill="#E59866" transform="rotate(-15 19 20)"/><ellipse cx="45" cy="20" rx="6" ry="9" fill="#E59866" transform="rotate(15 45 20)"/><circle cx="27" cy="21" r="3" fill="#2C2C2C"/><circle cx="28" cy="20" r="1" fill="white"/><circle cx="37" cy="21" r="3" fill="#2C2C2C"/><circle cx="38" cy="20" r="1" fill="white"/><ellipse cx="32" cy="27" rx="5" ry="3.5" fill="#E59866"/><circle cx="32" cy="26" r="2" fill="#C0392B"/></svg>
  </div>
  <div class="num">4<span>0</span>4</div>
  <div class="title">Esta página no existe</div>
  <div class="sub">Parece que el link está roto o la página fue movida. Tu mascota también se perdió buscándola.</div>
  <div class="btns">
    <a href="index.html" class="btn-main">← Volver al inicio</a>
    <a href="consulta.html" class="btn-out">Hacer una consulta</a>
  </div>
  <div class="suggestions">
    <a href="consulta.html" class="sug">🐾 Consultar</a>
    <a href="pagos.html" class="sug">💳 Planes</a>
    <a href="whatsapp.html" class="sug">💬 WhatsApp</a>
    <a href="dashboard.html" class="sug">👤 Mi cuenta</a>
  </div>
</div>
<script>
const dot=document.getElementById('cur'),ring=document.getElementById('cur2');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;dot.style.left=mx+'px';dot.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
</script>
</body>
</html>
